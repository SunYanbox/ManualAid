name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-npm-format:
    name: Check Format Tests by Npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Markdown Lint
        id: markdown-lint
        run: npm run md:format:check

      - name: Prettier Check
        id: prettier-check
        run: npm run prettier:format:check

  check-python-format:
    name: Check Format Tests by Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff Format Check
        run: ruff check .

      - name: FullWidth Check
        run: python ./scripts/fix_fullwidth.py check

  test-python-codes:
    name: Test Python Codes
    runs-on: ubuntu-latest
    needs: [check-python-format]

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest and Cov
        run: pytest tests/ -v --cov=src --cov-report=term-missing
